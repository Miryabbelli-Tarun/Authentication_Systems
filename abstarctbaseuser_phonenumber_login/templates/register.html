<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Create Account</title>
    <style>
        /* Modern Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        /* Center Register Card */
        .register-card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
        }

        .register-card h1 {
            color: #0f172a;
            font-size: 2rem;
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 700;
        }

        /* Form Layout */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: #475569;
        }

        /* Input Styling */
        .form-control {
            width: 100%;
            padding: 10px 14px;
            font-size: 0.95rem;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }

        .form-control:focus {
            border-color: #10b981; /* Fresh Emerald Green Accent */
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
        }

        /* Action Button */
        .btn-submit {
            width: 100%;
            background-color: #10b981; 
            color: white;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s ease-in-out, transform 0.1s ease-in-out;
            margin-top: 0.5rem;
        }

        .btn-submit:hover {
            background-color: #059669;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* Django Messages System Styling */
        .messages-container {
            margin-bottom: 1.25rem;
        }

        .alert {
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        /* Django message tag handling cases */
        .alert-error, .alert-danger {
            background-color: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fca5a5;
        }

        .alert-success {
            background-color: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .alert-warning {
            background-color: #fef3c7;
            color: #92400e;
            border: 1px solid #fde68a;
        }

        .alert-info {
            background-color: #e0f2fe;
            color: #075985;
            border: 1px solid #bae6fd;
        }

        /* Footer links */
        .card-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.85rem;
            color: #64748b;
        }

        .card-footer a {
            color: #10b981;
            text-decoration: none;
            font-weight: 600;
        }

        .card-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="register-card">
        <h1>Create Account</h1>

        <form action="" method="POST">
            {% csrf_token %}

            <!-- Django Flash Messages UI -->
            {% if messages %}
            <div class="messages-container">
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <!-- Username Field -->
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" class="form-control" placeholder="e.g. johndoe" required>
            </div>

            <!-- Phone Input Field -->
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="text" name="phone_number" id="phone" class="form-control" placeholder="Enter your mobile number" required>
            </div>

            <!-- Password Input Field -->
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>

            <!-- Confirm Password Input Field -->
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" name="confirm_password" id="confirm_password" class="form-control" placeholder="••••••••" required>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-submit">Register</button>
        </form>

        <div class="card-footer">
            Already have an account? <a href="{% url 'login' %}">Log in here</a>
        </div>
    </div>

</body>
</html>
